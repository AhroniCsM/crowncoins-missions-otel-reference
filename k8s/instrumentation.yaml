apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: nodejs-instrumentation
  namespace: default
spec:
  exporter:
    endpoint: http://$(OTEL_IP):4318
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  nodejs:
    # Custom auto-instrumentation image that adds @fastify/otel via
    # registerOnInitialization (same approach as the real service's
    # coralogix-autoinstrumentation.js) so the Fastify framework is instrumented.
    # The full route name on the transaction is still set by the app hook in
    # main.ts ("Fastify/GET//missions/v2/get-user-missions"). undici is disabled
    # via OTEL_NODE_DISABLED_INSTRUMENTATIONS in the Deployment env (load-gen noise).
    # Build: see otel/ in this repo (Dockerfile.autoinstrumentation + coralogix-autoinstrumentation.js).
    image: 104013952213.dkr.ecr.eu-north-1.amazonaws.com/crowncoins-sim-autoinstrumentation:nodejs-fastify-v4
    env:
      - name: OTEL_IP
        valueFrom:
          fieldRef:
            fieldPath: status.hostIP
      - name: OTEL_LOGS_EXPORTER
        value: none
      - name: OTEL_METRICS_EXPORTER
        value: none
      - name: OTEL_NODEJS_AUTO_INSTRUMENTATION_ENABLED
        value: "true"
      - name: OTEL_LOG_LEVEL
        value: info
    resourceRequirements:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
